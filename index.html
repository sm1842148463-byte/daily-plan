<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日工作安排</title>
  <style>
    :root {
      --ink: #17231d;
      --muted: #728077;
      --paper: #f5f3ec;
      --card: rgba(255,255,255,.78);
      --line: rgba(23,35,29,.12);
      --green: #285c45;
      --lime: #dceb82;
      --orange: #ec815c;
      --shadow: 0 18px 55px rgba(36,48,40,.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink); background:
        radial-gradient(circle at 10% 0%, rgba(220,235,130,.42), transparent 28rem),
        radial-gradient(circle at 90% 95%, rgba(236,129,92,.18), transparent 24rem),
        var(--paper);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.22; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.15'/%3E%3C/svg%3E"); }
    .shell { width:min(1180px, calc(100% - 40px)); margin:0 auto; padding:48px 0 64px; position:relative; }
    header { display:flex; justify-content:space-between; align-items:flex-start; gap:28px; margin-bottom:36px; }
    .eyebrow { display:inline-flex; align-items:center; gap:9px; color:var(--green); font-size:13px; font-weight:750; letter-spacing:.16em; text-transform:uppercase; }
    .eyebrow::before { content:""; width:26px; height:2px; background:var(--green); }
    h1 { margin:12px 0 8px; font-family:Georgia,"Songti SC",serif; font-size:clamp(40px,6vw,76px); line-height:.96; letter-spacing:-.045em; font-weight:500; }
    .date { color:var(--muted); font-size:15px; }
    .header-side { width:min(360px,38vw); display:flex; flex-direction:column; align-items:flex-end; gap:14px; }
    .quote { width:100%; margin-top:4px; padding:15px 20px; border-left:1px solid var(--line); color:var(--muted); line-height:1.7; font-family:Georgia,"Songti SC",serif; font-style:italic; }
    .account { display:flex; align-items:center; gap:10px; padding:8px 9px 8px 14px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.68); box-shadow:0 8px 24px rgba(36,48,40,.06); }
    .account-status { max-width:190px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:12px; }
    .account button { border:0; border-radius:999px; padding:8px 12px; background:var(--green); color:#fff; font-weight:700; cursor:pointer; }
    .account button.ghost-account { border:1px solid var(--line); background:transparent; color:var(--green); }
    .sync-dot { width:7px; height:7px; border-radius:50%; background:#a7afa9; }
    .sync-dot.online { background:#62a776; box-shadow:0 0 0 4px rgba(98,167,118,.14); }
    .layout { display:grid; grid-template-columns:minmax(0,1.65fr) minmax(280px,.8fr); gap:22px; }
    .panel { background:var(--card); border:1px solid rgba(255,255,255,.8); border-radius:26px; box-shadow:var(--shadow); backdrop-filter:blur(16px); }
    .schedule { padding:28px; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
    .panel-head h2, .side h2 { margin:0; font-size:18px; letter-spacing:-.02em; }
    .head-actions { display:flex; gap:8px; align-items:center; }
    .add { border:0; background:var(--ink); color:#fff; border-radius:999px; padding:10px 15px; font-weight:700; cursor:pointer; transition:.2s; }
    .add:hover { transform:translateY(-2px); background:var(--green); }
    .float-btn { border:1px solid var(--line); background:#fff; color:var(--green); border-radius:999px; padding:9px 13px; font-weight:700; cursor:pointer; transition:.2s; }
    .float-btn:hover { border-color:var(--green); transform:translateY(-2px); }
    .float-btn.active { background:var(--lime); border-color:var(--lime); color:#34401d; }
    .timeline { display:flex; flex-direction:column; }
    .task { display:grid; grid-template-columns:62px 22px 1fr auto; gap:14px; align-items:start; padding:19px 4px; border-top:1px solid var(--line); animation:enter .42s both; }
    .time { font-size:13px; color:var(--muted); padding-top:4px; font-variant-numeric:tabular-nums; }
    .check { appearance:none; width:20px; height:20px; margin:1px 0 0; border:1.5px solid #aab2ac; border-radius:50%; cursor:pointer; position:relative; }
    .check:checked { background:var(--green); border-color:var(--green); }
    .check:checked::after { content:"✓"; color:#fff; font-size:12px; position:absolute; left:4px; top:0px; }
    .task-title { font-size:16px; font-weight:760; margin:0 0 7px; transition:.2s; }
    .task-note { color:var(--muted); font-size:13px; line-height:1.5; }
    .task.done .task-title { color:#9ba49e; text-decoration:line-through; }
    .task.done .task-note { opacity:.5; }
    .task-actions { display:flex; align-items:center; gap:7px; }
    .tag { font-size:11px; border-radius:999px; padding:6px 9px; background:#eef0eb; color:#6c776f; white-space:nowrap; }
    .tag.focus { background:var(--lime); color:#34401d; }
    .tag.meeting { background:#f7ded4; color:#8e4731; }
    .delete { width:28px; height:28px; border:0; border-radius:50%; background:transparent; color:#9aa39d; cursor:pointer; font-size:17px; line-height:1; transition:.2s; }
    .delete:hover { color:#a53e2c; background:#f7ded4; transform:rotate(6deg); }
    .side { display:flex; flex-direction:column; gap:22px; }
    .focus-card { background:var(--green); color:#fff; padding:28px; overflow:hidden; position:relative; }
    .focus-card::after { content:""; position:absolute; width:150px; height:150px; border:35px solid rgba(220,235,130,.12); border-radius:50%; right:-65px; bottom:-65px; pointer-events:none; }
    .focus-card h2 { color:#dce5df; font-size:13px; letter-spacing:.12em; text-transform:uppercase; }
    .focus-card strong { display:block; max-width:230px; margin-top:20px; font-family:Georgia,"Songti SC",serif; font-size:27px; line-height:1.3; font-weight:500; }
    .focus-card p { color:#bdcec4; font-size:13px; line-height:1.6; margin:14px 0 0; }
    .editable { position:relative; z-index:1; border-radius:7px; outline:1px solid transparent; transition:.2s; cursor:text; }
    .editable:hover { outline-color:rgba(255,255,255,.28); }
    .editable:focus { outline:2px solid var(--lime); outline-offset:4px; }
    .edit-hint { display:block; position:relative; z-index:1; margin-top:19px; color:#91aa9b; font-size:10px; letter-spacing:.08em; }
    .progress-card { padding:28px; }
    .progress-ring { width:138px; height:138px; margin:24px auto 18px; border-radius:50%; display:grid; place-items:center; background:conic-gradient(var(--orange) var(--progress), #e8e8e1 0); position:relative; }
    .progress-ring::before { content:""; width:104px; height:104px; border-radius:50%; background:#fbfaf6; position:absolute; }
    .percent { z-index:1; text-align:center; font-family:Georgia,serif; font-size:29px; }
    .percent small { display:block; font:11px Inter,sans-serif; color:var(--muted); margin-top:2px; }
    .stats { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; }
    .stats b { display:block; color:var(--ink); font-size:18px; margin-bottom:3px; }
    .weekly-panel { margin-top:22px; padding:28px; }
    .weekly-head { display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:22px; }
    .weekly-head h2 { margin:0 0 5px; font-size:18px; }
    .weekly-head p, .week-range { margin:0; color:var(--muted); font-size:12px; }
    .week-range { padding:7px 11px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.6); white-space:nowrap; }
    .weekly-layout { display:grid; grid-template-columns:minmax(0,2.5fr) minmax(230px,.75fr); gap:16px; }
    .week-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:10px; }
    .day-card { min-width:0; min-height:176px; padding:15px 13px; border:1px solid var(--line); border-radius:18px; background:rgba(255,255,255,.58); }
    .day-card.today-card { border-color:rgba(40,92,69,.42); background:rgba(220,235,130,.22); box-shadow:inset 0 0 0 1px rgba(40,92,69,.08); }
    .day-head { display:flex; justify-content:space-between; align-items:baseline; gap:6px; margin-bottom:12px; }
    .day-name { font-size:13px; font-weight:800; }
    .day-date { color:var(--muted); font-size:10px; white-space:nowrap; }
    .day-card textarea, .weekly-focus textarea { width:100%; resize:none; border:0; outline:0; background:transparent; color:var(--ink); font:13px/1.65 "PingFang SC","Microsoft YaHei",sans-serif; }
    .day-card textarea { height:118px; }
    .day-card textarea::placeholder, .weekly-focus textarea::placeholder { color:#a3aaa5; }
    .weekly-focus { min-height:176px; padding:19px; border-radius:20px; background:#e7edcf; border:1px solid rgba(40,92,69,.1); }
    .weekly-focus h3 { margin:0 0 5px; font-size:15px; }
    .weekly-focus p { margin:0 0 12px; color:#728077; font-size:11px; }
    .weekly-focus textarea { height:116px; }
    .notes-panel { margin-top:22px; padding:28px; }
    .notes-head { display:flex; justify-content:space-between; align-items:center; gap:18px; margin-bottom:22px; }
    .notes-head h2 { margin:0 0 5px; font-size:18px; }
    .notes-head p { margin:0; color:var(--muted); font-size:12px; }
    .notes-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    .sticky { min-height:168px; padding:18px; border-radius:18px; position:relative; background:#f6e8a8; box-shadow:0 9px 22px rgba(48,43,27,.08); transform:rotate(-.35deg); }
    .sticky:nth-child(3n+2) { background:#dbeabf; transform:rotate(.45deg); }
    .sticky:nth-child(3n) { background:#f2d1c6; transform:rotate(-.15deg); }
    .sticky textarea { display:block; width:100%; height:118px; resize:none; border:0; padding:0 28px 0 0; outline:0; background:transparent; color:#35352d; font:15px/1.7 "PingFang SC","Microsoft YaHei",sans-serif; }
    .sticky textarea::placeholder { color:rgba(53,53,45,.45); }
    .note-delete { position:absolute; right:12px; top:11px; width:27px; height:27px; border:0; border-radius:50%; background:rgba(255,255,255,.35); color:#766f5e; cursor:pointer; font-size:16px; }
    .note-delete:hover { background:rgba(255,255,255,.72); color:#a53e2c; }
    dialog { border:0; border-radius:24px; padding:0; width:min(430px,calc(100% - 30px)); box-shadow:0 28px 90px rgba(0,0,0,.25); background:#faf9f4; }
    dialog::backdrop { background:rgba(20,29,24,.38); backdrop-filter:blur(4px); }
    form { padding:27px; }
    form h3 { margin:0 0 22px; font-size:21px; }
    label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; }
    input, select { width:100%; border:1px solid var(--line); background:#fff; border-radius:12px; padding:12px 13px; font:inherit; color:var(--ink); outline:none; }
    input:focus, select:focus { border-color:var(--green); }
    .form-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
    .ghost { border:1px solid var(--line); background:transparent; border-radius:999px; padding:10px 16px; cursor:pointer; }
    .auth-copy { margin:-10px 0 18px; color:var(--muted); font-size:13px; line-height:1.6; }
    .auth-message { min-height:20px; margin:12px 0 0; color:#a34f38; font-size:12px; line-height:1.5; }
    .auth-message.ok { color:var(--green); }
    .auth-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
    .auth-actions button { width:100%; }
    @keyframes enter { from { opacity:0; transform:translateY(8px); } }
    @media (max-width:980px) { .weekly-layout{grid-template-columns:1fr}.week-grid{grid-template-columns:repeat(4,minmax(0,1fr))} }
    @media (max-width:780px) { .shell{width:min(100% - 24px,680px);padding-top:28px} header{display:block}.header-side{width:auto;align-items:flex-start;margin-top:22px}.quote{display:none}.layout{grid-template-columns:1fr}.task{grid-template-columns:50px 22px 1fr}.tag{display:none}.schedule{padding:22px}.side{display:grid;grid-template-columns:1fr 1fr}.focus-card strong{font-size:22px}.notes-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.week-grid{grid-template-columns:repeat(2,minmax(0,1fr))} }
    @media (max-width:520px) { .side{grid-template-columns:1fr} h1{font-size:48px}.quote{display:none}.panel-head,.weekly-head{align-items:flex-start;gap:14px}.weekly-head{flex-direction:column}.head-actions{flex-direction:column;align-items:stretch}.head-actions button{white-space:nowrap}.weekly-panel,.notes-panel{padding:22px}.notes-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <div class="eyebrow">Daily Plan</div>
        <h1>今日工作安排</h1>
        <div class="date" id="today"></div>
      </div>
      <div class="header-side">
        <div class="account"><span class="sync-dot" id="syncDot"></span><span class="account-status" id="accountStatus">未登录 · 本机保存</span><button id="openAuth">登录 / 注册</button><button class="ghost-account" id="logout" hidden>退出</button></div>
        <div class="quote">把注意力放在真正重要的事情上，剩下的交给节奏。</div>
      </div>
    </header>

    <section class="layout">
      <div class="panel schedule">
        <div class="panel-head"><h2>时间安排</h2><div class="head-actions"><button class="float-btn" id="openPip">◱ 悬浮提醒</button><button class="add" id="openDialog">＋ 添加任务</button></div></div>
        <div class="timeline" id="timeline"></div>
      </div>
      <aside class="side">
        <section class="panel focus-card">
          <h2>今日最重要的事</h2>
          <strong class="editable" id="focusTitle" contenteditable="true" role="textbox" aria-label="编辑今日最重要的事" spellcheck="false">完成核心方案，并交付可评审版本</strong>
          <p class="editable" id="focusNote" contenteditable="true" role="textbox" aria-label="编辑重点说明" spellcheck="false">上午保持专注，先推进最需要深度思考的部分。</p>
          <small class="edit-hint">点击文字即可编辑 · 自动保存</small>
        </section>
        <section class="panel progress-card">
          <h2>今日进度</h2>
          <div class="progress-ring" id="ring"><div class="percent"><span id="percent">0%</span><small>已完成</small></div></div>
          <div class="stats"><span><b id="doneCount">0</b>完成</span><span style="text-align:right"><b id="leftCount">0</b>待处理</span></div>
        </section>
      </aside>
    </section>
    <section class="panel weekly-panel">
      <div class="weekly-head"><div><h2>本周日历</h2><p>每天一个格子，随手记录当天的安排</p></div><div class="week-range" id="weekRange"></div></div>
      <div class="weekly-layout">
        <div class="week-grid" id="weekGrid"></div>
        <aside class="weekly-focus"><h3>本周重点工作</h3><p>写下这一周最需要推进的事项</p><textarea id="weeklyFocus" aria-label="编辑本周重点工作" placeholder="例如：&#10;1. 完成核心方案&#10;2. 推进客户确认&#10;3. 做好周五复盘"></textarea></aside>
      </div>
    </section>
    <section class="panel notes-panel">
      <div class="notes-head"><div><h2>随手便签</h2><p id="notesHint">想到什么就写下来，登录后可在不同电脑间同步</p></div><button class="add" id="addNote">＋ 新建便签</button></div>
      <div class="notes-grid" id="notesGrid"></div>
    </section>
  </main>

  <dialog id="taskDialog">
    <form id="taskForm">
      <h3>添加一项安排</h3>
      <label for="taskTime">时间</label><input id="taskTime" type="time" value="14:00" required>
      <label for="taskTitle">任务名称</label><input id="taskTitle" placeholder="例如：整理项目周报" required>
      <label for="taskNote">补充说明</label><input id="taskNote" placeholder="可选">
      <label for="taskType">类型</label><select id="taskType"><option value="常规">常规</option><option value="专注">专注</option><option value="会议">会议</option><option value="休息">休息</option></select>
      <div class="form-actions"><button type="button" class="ghost" id="cancelDialog">取消</button><button class="add" type="submit">添加到今天</button></div>
    </form>
  </dialog>

  <dialog id="authDialog">
    <form id="authForm">
      <h3>登录或创建账号</h3>
      <p class="auth-copy">使用邮箱和密码。登录后，任务、重点事项和便签会安全同步到你的账号。</p>
      <label for="authEmail">邮箱</label><input id="authEmail" type="email" autocomplete="email" placeholder="name@example.com" required>
      <label for="authPassword">密码</label><input id="authPassword" type="password" autocomplete="current-password" minlength="6" placeholder="至少 6 位" required>
      <div class="auth-message" id="authMessage" aria-live="polite"></div>
      <div class="auth-actions"><button class="add" type="submit">登录</button><button class="ghost" type="button" id="register">注册新账号</button></div>
      <div class="form-actions"><button type="button" class="ghost" id="cancelAuth">取消</button></div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://jeywkltcbcuckecgbqto.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY='sb_publishable_UH9dUtNMWylU4VPXeuy0lg_aQQ5NVY4';
    const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
    const seed = [
      {time:'09:00', title:'梳理今日重点', note:'查看消息与待办，确定今天的三个关键产出', type:'常规'},
      {time:'09:30', title:'核心方案深度工作', note:'关闭通知，集中完成方案主体与关键细节', type:'专注'},
      {time:'11:30', title:'同步项目进展', note:'与协作伙伴确认问题、风险与下一步', type:'会议'},
      {time:'12:00', title:'午餐与短暂休息', note:'离开屏幕，让注意力重新充电', type:'休息'},
      {time:'14:00', title:'完善并提交方案', note:'补充数据、校对内容，提交可评审版本', type:'专注'},
      {time:'16:00', title:'处理反馈与杂项', note:'集中回复消息，完成轻量事务', type:'常规'},
      {time:'17:30', title:'今日复盘', note:'记录完成情况，并写下明天的第一件事', type:'常规'}
    ];
    const key = 'daily-plan-v1';
    let tasks = JSON.parse(localStorage.getItem(key) || 'null') || seed.map((t,i)=>({...t,id:Date.now()+i,done:false}));
    const timeline = document.getElementById('timeline');
    const notesGrid = document.getElementById('notesGrid');
    const labels = {专注:'focus',会议:'meeting'};
    let pipWindow=null;
    const notesKey='daily-plan-notes-v1';
    let notes=JSON.parse(localStorage.getItem(notesKey)||'null')||[{id:Date.now(),text:''}];
    const esc = value => String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    let currentUser=null, syncTimer=null, hydrating=false;
    function queueCloudSave(){
      if(!currentUser || hydrating) return;
      clearTimeout(syncTimer);
      accountStatus.textContent='正在同步…';
      syncTimer=setTimeout(saveToCloud,450);
    }
    async function saveToCloud(){
      if(!currentUser) return;
      const {error}=await supabaseClient.from('daily_plan_data').upsert({user_id:currentUser.id,tasks,notes,focus,updated_at:new Date().toISOString()});
      accountStatus.textContent=error ? '同步失败，请稍后重试' : `${currentUser.email} · 已同步`;
      syncDot.classList.toggle('online',!error);
    }
    function save(){ localStorage.setItem(key, JSON.stringify(tasks)); queueCloudSave(); }
    function saveNotes(){ localStorage.setItem(notesKey,JSON.stringify(notes)); queueCloudSave(); }
    function saveFocus(){ localStorage.setItem(focusKey,JSON.stringify(focus)); queueCloudSave(); }
    function renderNotes(){
      notesGrid.innerHTML=notes.map(n=>`<article class="sticky" data-id="${n.id}"><textarea aria-label="便签内容" placeholder="写点什么……"></textarea><button class="note-delete" type="button" aria-label="删除便签" title="删除便签">×</button></article>`).join('');
      notesGrid.querySelectorAll('.sticky').forEach(card=>{ const id=Number(card.dataset.id), note=notes.find(n=>n.id===id), area=card.querySelector('textarea'); area.value=note.text; area.addEventListener('input',()=>{ note.text=area.value; saveNotes(); }); card.querySelector('.note-delete').onclick=()=>{ if(confirm('确定删除这张便签吗？')){ notes=notes.filter(n=>n.id!==id); saveNotes(); renderNotes(); } }; });
    }
    function render(){
      tasks.sort((a,b)=>a.time.localeCompare(b.time));
      timeline.innerHTML = tasks.map(t=>`<article class="task ${t.done?'done':''}" data-id="${t.id}">
        <time class="time">${t.time}</time><input class="check" type="checkbox" ${t.done?'checked':''} aria-label="完成 ${t.title}">
        <div><h3 class="task-title">${esc(t.title)}</h3><div class="task-note">${esc(t.note || '按计划推进这项工作')}</div></div>
        <div class="task-actions"><span class="tag ${labels[t.type]||''}">${esc(t.type)}</span><button class="delete" type="button" aria-label="删除 ${esc(t.title)}" title="删除事项">×</button></div></article>`).join('');
      const done = tasks.filter(t=>t.done).length, pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
      document.getElementById('percent').textContent = pct+'%';
      document.getElementById('doneCount').textContent = done;
      document.getElementById('leftCount').textContent = tasks.length-done;
      document.getElementById('ring').style.setProperty('--progress',pct+'%');
      document.querySelectorAll('.check').forEach(c=>c.addEventListener('change',e=>{ const id=Number(e.target.closest('.task').dataset.id); tasks.find(t=>t.id===id).done=e.target.checked; save(); render(); }));
      document.querySelectorAll('.delete').forEach(btn=>btn.addEventListener('click',e=>{ const id=Number(e.target.closest('.task').dataset.id), task=tasks.find(t=>t.id===id); if(confirm(`确定删除“${task.title}”吗？`)){ tasks=tasks.filter(t=>t.id!==id); save(); render(); } }));
      updatePip();
    }
    function taskMoment(task){ const [hour,minute]=task.time.split(':').map(Number), moment=new Date(); moment.setHours(hour,minute,0,0); return moment; }
    function nextTask(){
      const pending=tasks.filter(t=>!t.done).sort((a,b)=>a.time.localeCompare(b.time));
      return pending.find(t=>taskMoment(t)>=new Date()) || pending[0] || null;
    }
    function countdown(task){
      if(!task) return '今天的事项全部完成';
      const diff=taskMoment(task)-new Date();
      if(diff<=0) return '已到时间';
      const total=Math.ceil(diff/60000), hours=Math.floor(total/60), mins=total%60;
      return hours ? `${hours} 小时 ${mins} 分钟后` : `${mins} 分钟后`;
    }
    function updatePip(){
      if(!pipWindow || pipWindow.closed) return;
      const task=nextTask(), doc=pipWindow.document;
      doc.getElementById('pipTime').textContent=task ? task.time : '完成';
      doc.getElementById('pipTitle').textContent=task ? task.title : '今天辛苦了';
      doc.getElementById('pipCountdown').textContent=countdown(task);
      const done=doc.getElementById('pipDone'); done.hidden=!task; done.onclick=()=>{ task.done=true; save(); render(); };
    }
    async function openFloatingReminder(){
      if(!('documentPictureInPicture' in window)){ alert('当前浏览器暂不支持悬浮提醒，请使用最新版 Chrome 或 Edge。'); return; }
      if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
      if(pipWindow && !pipWindow.closed){ pipWindow.focus(); return; }
      pipWindow=await documentPictureInPicture.requestWindow({width:360,height:230});
      pipWindow.document.head.innerHTML=`<meta charset="UTF-8"><title>悬浮提醒</title><style>*{box-sizing:border-box}body{margin:0;padding:22px;background:#17231d;color:#fff;font-family:Inter,"Microsoft YaHei",sans-serif;display:flex;min-height:100vh;align-items:center}.card{width:100%}.label{color:#a7b9ae;font-size:11px;letter-spacing:.13em;text-transform:uppercase}.top{display:flex;justify-content:space-between;align-items:center;margin:13px 0 9px}.time{font:28px Georgia,serif;color:#dceb82}.count{color:#a7b9ae;font-size:12px}.title{font-size:21px;font-weight:750;line-height:1.35;margin:0 0 18px}.done{border:0;border-radius:999px;background:#dceb82;color:#26361c;padding:9px 14px;font-weight:750;cursor:pointer}</style>`;
      pipWindow.document.body.innerHTML='<div class="card"><div class="label">Next up · 下一项</div><div class="top"><span class="time" id="pipTime"></span><span class="count" id="pipCountdown"></span></div><div class="title" id="pipTitle"></div><button class="done" id="pipDone">✓ 标记完成</button></div>';
      openPip.classList.add('active'); openPip.textContent='◱ 悬浮已开启';
      pipWindow.addEventListener('pagehide',()=>{ pipWindow=null; openPip.classList.remove('active'); openPip.textContent='◱ 悬浮提醒'; });
      updatePip();
    }
    function checkDueNotifications(){
      const now=new Date(), today=`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`, sentKey='daily-plan-notified-v1', sent=JSON.parse(localStorage.getItem(sentKey)||'[]');
      tasks.filter(t=>!t.done).forEach(t=>{ const due=taskMoment(t), id=`${today}-${t.id}`; if(Math.abs(now-due)<60000 && !sent.includes(id)){ if('Notification' in window && Notification.permission==='granted') new Notification('日程提醒',{body:`${t.time} · ${t.title}`}); sent.push(id); } });
      localStorage.setItem(sentKey,JSON.stringify(sent.slice(-100)));
    }
    const now = new Date();
    document.getElementById('today').textContent = new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(now);
    document.getElementById('openPip').onclick=openFloatingReminder;
    document.getElementById('addNote').onclick=()=>{ notes.unshift({id:Date.now(),text:''}); saveNotes(); renderNotes(); notesGrid.querySelector('textarea').focus(); };
    const focusKey='daily-plan-focus-v1', focusDefault={title:'完成核心方案，并交付可评审版本',note:'上午保持专注，先推进最需要深度思考的部分。',weeklyCalendar:{},weeklyPriorities:''};
    let focus={...focusDefault,...(JSON.parse(localStorage.getItem(focusKey)||'null')||{})};
    focus.weeklyCalendar=focus.weeklyCalendar||{};
    focus.weeklyPriorities=focus.weeklyPriorities||'';
    focusTitle.textContent=focus.title; focusNote.textContent=focus.note;
    [focusTitle,focusNote].forEach(el=>el.addEventListener('blur',()=>{ focus={...focus,title:focusTitle.textContent.trim()||focusDefault.title,note:focusNote.textContent.trim()||focusDefault.note}; focusTitle.textContent=focus.title; focusNote.textContent=focus.note; saveFocus(); }));
    const weekNames=['周一','周二','周三','周四','周五','周六','周日'];
    const dateKey=date=>`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    function currentWeekDates(){ const base=new Date(), day=base.getDay()||7, monday=new Date(base); monday.setHours(0,0,0,0); monday.setDate(base.getDate()-day+1); return Array.from({length:7},(_,i)=>{ const date=new Date(monday); date.setDate(monday.getDate()+i); return date; }); }
    function renderWeekly(){
      const dates=currentWeekDates(), todayKey=dateKey(new Date());
      weekRange.textContent=`${dates[0].getMonth()+1}月${dates[0].getDate()}日 — ${dates[6].getMonth()+1}月${dates[6].getDate()}日`;
      weekGrid.innerHTML=dates.map((date,index)=>`<article class="day-card ${dateKey(date)===todayKey?'today-card':''}" data-date="${dateKey(date)}"><div class="day-head"><span class="day-name">${weekNames[index]}</span><span class="day-date">${date.getMonth()+1}/${date.getDate()}</span></div><textarea aria-label="编辑${weekNames[index]}安排" placeholder="写下当天安排…"></textarea></article>`).join('');
      weekGrid.querySelectorAll('.day-card').forEach(card=>{ const area=card.querySelector('textarea'), key=card.dataset.date; area.value=focus.weeklyCalendar[key]||''; area.addEventListener('input',()=>{ focus.weeklyCalendar[key]=area.value; saveFocus(); }); });
      weeklyFocus.value=focus.weeklyPriorities;
    }
    weeklyFocus.addEventListener('input',()=>{ focus.weeklyPriorities=weeklyFocus.value; saveFocus(); });
    renderWeekly();
    const dialog=document.getElementById('taskDialog');
    document.getElementById('openDialog').onclick=()=>dialog.showModal();
    document.getElementById('cancelDialog').onclick=()=>dialog.close();
    document.getElementById('taskForm').onsubmit=e=>{e.preventDefault(); tasks.push({id:Date.now(),time:taskTime.value,title:taskTitle.value.trim(),note:taskNote.value.trim(),type:taskType.value,done:false}); save(); render(); e.target.reset(); dialog.close();};
    const authDialog=document.getElementById('authDialog'), authForm=document.getElementById('authForm'), authMessage=document.getElementById('authMessage');
    function setAuthMessage(text,ok=false){ authMessage.textContent=text; authMessage.classList.toggle('ok',ok); }
    function setSignedOut(){ currentUser=null; syncDot.classList.remove('online'); accountStatus.textContent='未登录 · 本机保存'; openAuth.hidden=false; logout.hidden=true; notesHint.textContent='想到什么就写下来，登录后可在不同电脑间同步'; }
    async function loadUserData(user){
      currentUser=user; openAuth.hidden=true; logout.hidden=false; syncDot.classList.add('online'); accountStatus.textContent='正在读取云端数据…';
      const {data,error}=await supabaseClient.from('daily_plan_data').select('tasks,notes,focus').eq('user_id',user.id).maybeSingle();
      if(error){ accountStatus.textContent='云端读取失败'; syncDot.classList.remove('online'); return; }
      if(data){
        hydrating=true;
        tasks=Array.isArray(data.tasks)?data.tasks:tasks;
        notes=Array.isArray(data.notes)?data.notes:notes;
        focus=data.focus&&data.focus.title?{...focusDefault,...data.focus}:focus;
        focus.weeklyCalendar=focus.weeklyCalendar||{}; focus.weeklyPriorities=focus.weeklyPriorities||'';
        localStorage.setItem(key,JSON.stringify(tasks)); localStorage.setItem(notesKey,JSON.stringify(notes)); localStorage.setItem(focusKey,JSON.stringify(focus));
        focusTitle.textContent=focus.title; focusNote.textContent=focus.note; render(); renderNotes(); renderWeekly();
        hydrating=false;
      } else await saveToCloud();
      accountStatus.textContent=`${user.email} · 已同步`; notesHint.textContent='内容已加密连接到你的账号，可在不同电脑间同步';
    }
    async function submitAuth(mode){
      if(!authForm.reportValidity()) return;
      const email=authEmail.value.trim(), password=authPassword.value;
      setAuthMessage(mode==='login'?'正在登录…':'正在创建账号…',true);
      const result=mode==='login'
        ? await supabaseClient.auth.signInWithPassword({email,password})
        : await supabaseClient.auth.signUp({email,password,options:{emailRedirectTo:location.origin+location.pathname}});
      if(result.error){ setAuthMessage(result.error.message); return; }
      if(mode==='register' && !result.data.session){ setAuthMessage('注册成功！请打开邮箱完成验证，然后回来登录。',true); return; }
      authDialog.close(); authForm.reset(); setAuthMessage('');
    }
    openAuth.onclick=()=>{ setAuthMessage(''); authDialog.showModal(); };
    cancelAuth.onclick=()=>authDialog.close();
    authForm.onsubmit=e=>{ e.preventDefault(); submitAuth('login'); };
    register.onclick=()=>submitAuth('register');
    logout.onclick=async()=>{ await supabaseClient.auth.signOut(); setSignedOut(); };
    supabaseClient.auth.onAuthStateChange((_event,session)=>{ if(session?.user){ if(currentUser?.id!==session.user.id) setTimeout(()=>loadUserData(session.user),0); } else setSignedOut(); });
    supabaseClient.auth.getSession().then(({data})=>{ if(data.session?.user) loadUserData(data.session.user); else setSignedOut(); });
    setInterval(updatePip,1000);
    setInterval(checkDueNotifications,15000);
    checkDueNotifications();
    render();
    renderNotes();
  </script>
</body>
</html>
