name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android/**"
      - "index.html"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Download existing release certificate
        uses: actions/download-artifact@v4
        with:
          name: daily-plan-release-v1.0.0
          path: signing-source
          github-token: ${{ github.token }}
          repository: sm1842148463-byte/daily-plan
          run-id: 27966880766

      - name: Prepare existing release certificate
        working-directory: android
        shell: bash
        run: |
          SIGNING_INFO="$(find "$GITHUB_WORKSPACE/signing-source" -name '签名信息-请妥善保管.txt' -print -quit)"
          SIGNING_KEY="$(find "$GITHUB_WORKSPACE/signing-source" -name 'daily-plan-release.jks' -print -quit)"
          test -n "$SIGNING_INFO" && test -n "$SIGNING_KEY"
          SIGNING_PASSWORD="$(sed -n 's/^证书密码：//p' "$SIGNING_INFO" | head -n 1)"
          test -n "$SIGNING_PASSWORD"
          echo "::add-mask::$SIGNING_PASSWORD"
          cp "$SIGNING_KEY" daily-plan-release.jks
          echo "DAILY_PLAN_KEYSTORE=$GITHUB_WORKSPACE/android/daily-plan-release.jks" >> "$GITHUB_ENV"
          echo "DAILY_PLAN_STORE_PASSWORD=$SIGNING_PASSWORD" >> "$GITHUB_ENV"
          echo "DAILY_PLAN_KEY_PASSWORD=$SIGNING_PASSWORD" >> "$GITHUB_ENV"
          echo "DAILY_PLAN_KEY_ALIAS=dailyplan" >> "$GITHUB_ENV"
          mkdir -p "$GITHUB_WORKSPACE/release-output"
          cp "$SIGNING_INFO" "$GITHUB_WORKSPACE/release-output/签名信息-请妥善保管.txt"

      - name: Build signed release APK
        working-directory: android
        run: gradle assembleRelease --stacktrace

      - name: Package release files
        shell: bash
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk release-output/今日工作安排-v1.0.1.apk
          cp android/daily-plan-release.jks release-output/daily-plan-release.jks
          sha256sum release-output/今日工作安排-v1.0.1.apk > release-output/SHA256.txt

      - name: Upload signed release package
        uses: actions/upload-artifact@v4
        with:
          name: daily-plan-release-v1.0.1
          path: release-output/*
          if-no-files-found: error
