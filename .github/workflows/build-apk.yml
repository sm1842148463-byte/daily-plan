name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Prepare release signing from GitHub Secrets
        working-directory: android
        shell: bash
        env:
          DAILY_PLAN_KEYSTORE_BASE64: ${{ secrets.DAILY_PLAN_KEYSTORE_BASE64 }}
          DAILY_PLAN_STORE_PASSWORD: ${{ secrets.DAILY_PLAN_STORE_PASSWORD }}
          DAILY_PLAN_KEY_PASSWORD: ${{ secrets.DAILY_PLAN_KEY_PASSWORD }}
          DAILY_PLAN_KEY_ALIAS: ${{ secrets.DAILY_PLAN_KEY_ALIAS }}
        run: |
          test -n "$DAILY_PLAN_KEYSTORE_BASE64"
          test -n "$DAILY_PLAN_STORE_PASSWORD"
          test -n "$DAILY_PLAN_KEY_PASSWORD"
          test -n "$DAILY_PLAN_KEY_ALIAS"
          printf '%s' "$DAILY_PLAN_KEYSTORE_BASE64" | base64 -d > daily-plan-release.jks
          echo "DAILY_PLAN_KEYSTORE=$GITHUB_WORKSPACE/android/daily-plan-release.jks" >> "$GITHUB_ENV"
          echo "DAILY_PLAN_STORE_PASSWORD=$DAILY_PLAN_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "DAILY_PLAN_KEY_PASSWORD=$DAILY_PLAN_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "DAILY_PLAN_KEY_ALIAS=$DAILY_PLAN_KEY_ALIAS" >> "$GITHUB_ENV"
          mkdir -p "$GITHUB_WORKSPACE/release-output"

      - name: Build signed release APK
        working-directory: android
        run: gradle assembleRelease --stacktrace

      - name: Package release files
        shell: bash
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk release-output/daily-plan-v1.0.2.apk
          sha256sum release-output/daily-plan-v1.0.2.apk > release-output/SHA256.txt

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-plan-release-v1.0.2
          path: release-output/*
          if-no-files-found: error
